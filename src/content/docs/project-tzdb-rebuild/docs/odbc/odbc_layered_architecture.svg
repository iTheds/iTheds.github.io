<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: bold; fill: #1a1a1a; }
      .layer-title { font-size: 15px; font-weight: bold; fill: #ffffff; }
      .component-title { font-size: 12px; font-weight: bold; fill: #ffffff; }
      .component-text { font-size: 10px; fill: #ffffff; }
      .arrow { stroke: #333333; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .layer-bg { fill-opacity: 0.1; stroke-width: 2; }
      .component-box { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="title">TZDB ODBC 驱动分层架构</text>

  <!-- Application Layer -->
  <rect x="50" y="80" width="1300" height="110" class="layer-bg" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="70" y="110" class="layer-title" fill="#1976D2">应用层 (Application Layer)</text>
  
  <rect x="70" y="125" width="240" height="50" class="component-box"/>
  <text x="190" y="145" text-anchor="middle" class="component-title">DBeaver</text>
  <text x="190" y="160" text-anchor="middle" class="component-text">数据库管理工具</text>

  <rect x="330" y="125" width="240" height="50" class="component-box"/>
  <text x="450" y="145" text-anchor="middle" class="component-title">Excel / Tableau</text>
  <text x="450" y="160" text-anchor="middle" class="component-text">数据分析工具</text>

  <rect x="590" y="125" width="240" height="50" class="component-box"/>
  <text x="710" y="145" text-anchor="middle" class="component-title">自定义应用</text>
  <text x="710" y="160" text-anchor="middle" class="component-text">C/C++/Java/Python</text>

  <rect x="850" y="125" width="240" height="50" class="component-box"/>
  <text x="970" y="145" text-anchor="middle" class="component-title">其他 ODBC 客户端</text>
  <text x="970" y="160" text-anchor="middle" class="component-text">标准 ODBC 接口</text>

  <rect x="1110" y="125" width="240" height="50" class="component-box"/>
  <text x="1230" y="145" text-anchor="middle" class="component-title">BI 工具</text>
  <text x="1230" y="160" text-anchor="middle" class="component-text">Power BI / Looker</text>

  <!-- Arrow -->
  <path d="M 700 235 L 700 260" class="arrow"/>

  <!-- ODBC API Layer -->
  <rect x="50" y="260" width="1300" height="150" class="layer-bg" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="70" y="290" class="layer-title" fill="#7B1FA2">ODBC API 层 (ODBC API Layer)</text>

  <rect x="70" y="305" width="150" height="90" class="component-box"/>
  <text x="145" y="325" text-anchor="middle" class="component-title">连接管理</text>
  <text x="145" y="340" text-anchor="middle" class="component-text">SQLAllocHandle</text>
  <text x="145" y="352" text-anchor="middle" class="component-text">SQLConnect</text>
  <text x="145" y="364" text-anchor="middle" class="component-text">SQLDriverConnect</text>
  <text x="145" y="376" text-anchor="middle" class="component-text">SQLFreeHandle</text>

  <rect x="240" y="305" width="150" height="90" class="component-box"/>
  <text x="315" y="325" text-anchor="middle" class="component-title">查询执行</text>
  <text x="315" y="340" text-anchor="middle" class="component-text">SQLPrepare</text>
  <text x="315" y="352" text-anchor="middle" class="component-text">SQLExecute</text>
  <text x="315" y="364" text-anchor="middle" class="component-text">SQLExecDirect</text>
  <text x="315" y="376" text-anchor="middle" class="component-text">SQLBindParameter</text>

  <rect x="410" y="305" width="150" height="90" class="component-box"/>
  <text x="485" y="325" text-anchor="middle" class="component-title">结果处理</text>
  <text x="485" y="340" text-anchor="middle" class="component-text">SQLFetch</text>
  <text x="485" y="352" text-anchor="middle" class="component-text">SQLGetData</text>
  <text x="485" y="364" text-anchor="middle" class="component-text">SQLNumResultCols</text>
  <text x="485" y="376" text-anchor="middle" class="component-text">SQLDescribeCol</text>

  <rect x="580" y="305" width="150" height="90" class="component-box"/>
  <text x="655" y="325" text-anchor="middle" class="component-title">事务管理</text>
  <text x="655" y="340" text-anchor="middle" class="component-text">SQLEndTran</text>
  <text x="655" y="352" text-anchor="middle" class="component-text">SQLSetConnectAttr</text>
  <text x="655" y="364" text-anchor="middle" class="component-text">SQL_ATTR_AUTOCOMMIT</text>
  <text x="655" y="376" text-anchor="middle" class="component-text">提交/回滚</text>

  <rect x="750" y="305" width="150" height="90" class="component-box"/>
  <text x="825" y="325" text-anchor="middle" class="component-title">元数据查询</text>
  <text x="825" y="340" text-anchor="middle" class="component-text">SQLTables</text>
  <text x="825" y="352" text-anchor="middle" class="component-text">SQLColumns</text>
  <text x="825" y="364" text-anchor="middle" class="component-text">SQLPrimaryKeys</text>
  <text x="825" y="376" text-anchor="middle" class="component-text">SQLGetInfo</text>

  <rect x="920" y="305" width="150" height="90" class="component-box"/>
  <text x="995" y="325" text-anchor="middle" class="component-title">诊断信息</text>
  <text x="995" y="340" text-anchor="middle" class="component-text">SQLGetDiagRec</text>
  <text x="995" y="352" text-anchor="middle" class="component-text">SQLGetDiagField</text>
  <text x="995" y="364" text-anchor="middle" class="component-text">错误处理</text>
  <text x="995" y="376" text-anchor="middle" class="component-text">诊断记录</text>

  <rect x="1090" y="305" width="150" height="90" class="component-box"/>
  <text x="1165" y="325" text-anchor="middle" class="component-title">属性管理</text>
  <text x="1165" y="340" text-anchor="middle" class="component-text">SQLSetEnvAttr</text>
  <text x="1165" y="352" text-anchor="middle" class="component-text">SQLGetConnectAttr</text>
  <text x="1165" y="364" text-anchor="middle" class="component-text">SQLSetStmtAttr</text>
  <text x="1165" y="376" text-anchor="middle" class="component-text">属性查询</text>

  <!-- Arrow -->
  <path d="M 700 395 L 700 420" class="arrow"/>

