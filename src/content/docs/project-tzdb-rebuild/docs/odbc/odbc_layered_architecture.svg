  <text x="70" y="450" class="layer-title" fill="#388E3C">驱动核心层 (Driver Core Layer)</text>

  <rect x="70" y="465" width="180" height="100" class="component-box"/>
  <text x="160" y="485" text-anchor="middle" class="component-title">句柄管理</text>
  <text x="160" y="500" text-anchor="middle" class="component-text">TzEnvironmentHandle</text>
  <text x="160" y="512" text-anchor="middle" class="component-text">TzConnectionHandle</text>
  <text x="160" y="524" text-anchor="middle" class="component-text">TzStatementHandle</text>
  <text x="160" y="536" text-anchor="middle" class="component-text">TzDescriptorHandle</text>
  <text x="160" y="548" text-anchor="middle" class="component-text">生命周期管理</text>

  <rect x="270" y="465" width="180" height="100" class="component-box"/>
  <text x="360" y="485" text-anchor="middle" class="component-title">连接管理</text>
  <text x="360" y="500" text-anchor="middle" class="component-text">连接字符串解析</text>
  <text x="360" y="512" text-anchor="middle" class="component-text">参数优先级处理</text>
  <text x="360" y="524" text-anchor="middle" class="component-text">DSN 查询</text>
  <text x="360" y="536" text-anchor="middle" class="component-text">连接状态管理</text>
  <text x="360" y="548" text-anchor="middle" class="component-text">多连接支持</text>

  <rect x="470" y="465" width="180" height="100" class="component-box"/>
  <text x="560" y="485" text-anchor="middle" class="component-title">语句执行</text>
  <text x="560" y="500" text-anchor="middle" class="component-text">SQL 准备/执行</text>
  <text x="560" y="512" text-anchor="middle" class="component-text">参数绑定</text>
  <text x="560" y="524" text-anchor="middle" class="component-text">结果集管理</text>
  <text x="560" y="536" text-anchor="middle" class="component-text">列绑定</text>
  <text x="560" y="548" text-anchor="middle" class="component-text">数据转换</text>

  <rect x="670" y="465" width="180" height="100" class="component-box"/>
  <text x="760" y="485" text-anchor="middle" class="component-title">事务管理</text>
  <text x="760" y="500" text-anchor="middle" class="component-text">事务生命周期</text>
  <text x="760" y="512" text-anchor="middle" class="component-text">自动/手动提交</text>
  <text x="760" y="524" text-anchor="middle" class="component-text">保存点支持</text>
  <text x="760" y="536" text-anchor="middle" class="component-text">隔离级别</text>
  <text x="760" y="548" text-anchor="middle" class="component-text">事务状态追踪</text>

  <rect x="870" y="465" width="180" height="100" class="component-box"/>
