  <text x="960" y="500" text-anchor="middle" class="component-text">表信息查询</text>
  <text x="960" y="512" text-anchor="middle" class="component-text">列信息查询</text>
  <text x="960" y="524" text-anchor="middle" class="component-text">主键信息</text>
  <text x="960" y="536" text-anchor="middle" class="component-text">元数据缓存</text>
  <text x="960" y="548" text-anchor="middle" class="component-text">动态发现</text>

  <rect x="1070" y="465" width="180" height="100" class="component-box"/>
  <text x="1160" y="485" text-anchor="middle" class="component-title">错误诊断</text>
  <text x="1160" y="500" text-anchor="middle" class="component-text">异常捕获</text>
  <text x="1160" y="512" text-anchor="middle" class="component-text">诊断记录生成</text>
  <text x="1160" y="524" text-anchor="middle" class="component-text">SQLSTATE 映射</text>
  <text x="1160" y="536" text-anchor="middle" class="component-text">错误消息</text>
  <text x="1160" y="548" text-anchor="middle" class="component-text">日志输出</text>

  <!-- Arrow -->
  <path d="M 700 625 L 700 650" class="arrow"/>

  <!-- Database Engine Layer -->
  <rect x="50" y="650" width="1300" height="150" class="layer-bg" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="70" y="680" class="layer-title" fill="#E65100">数据库引擎层 (Database Engine Layer)</text>

  <rect x="70" y="695" width="220" height="90" class="component-box"/>
  <text x="180" y="715" text-anchor="middle" class="component-title">数据库连接</text>
  <text x="180" y="730" text-anchor="middle" class="component-text">Database 对象</text>
  <text x="180" y="742" text-anchor="middle" class="component-text">连接建立/关闭</text>
  <text x="180" y="754" text-anchor="middle" class="component-text">连接状态检查</text>
  <text x="180" y="766" text-anchor="middle" class="component-text">路径管理</text>

  <rect x="310" y="695" width="220" height="90" class="component-box"/>
  <text x="420" y="715" text-anchor="middle" class="component-title">事务管理器</text>
  <text x="420" y="730" text-anchor="middle" class="component-text">TransactionManager</text>
  <text x="420" y="742" text-anchor="middle" class="component-text">事务创建/提交</text>
  <text x="420" y="754" text-anchor="middle" class="component-text">并发控制</text>
  <text x="420" y="766" text-anchor="middle" class="component-text">MVCC/锁机制</text>

  <rect x="550" y="695" width="220" height="90" class="component-box"/>
  <text x="660" y="715" text-anchor="middle" class="component-title">SQL 上下文</text>
  <text x="660" y="730" text-anchor="middle" class="component-text">SqlContext</text>
  <text x="660" y="742" text-anchor="middle" class="component-text">SQL 解析/执行</text>
  <text x="660" y="754" text-anchor="middle" class="component-text">查询优化</text>
  <text x="660" y="766" text-anchor="middle" class="component-text">结果返回</text>

  <rect x="790" y="695" width="220" height="90" class="component-box"/>
  <text x="900" y="715" text-anchor="middle" class="component-title">数据目录</text>
  <text x="900" y="730" text-anchor="middle" class="component-text">Catalog</text>
  <text x="900" y="742" text-anchor="middle" class="component-text">表结构信息</text>
  <text x="900" y="754" text-anchor="middle" class="component-text">索引管理</text>
  <text x="900" y="766" text-anchor="middle" class="component-text">元数据存储</text>

  <rect x="1030" y="695" width="220" height="90" class="component-box"/>
  <text x="1140" y="715" text-anchor="middle" class="component-title">存储引擎</text>
  <text x="1140" y="730" text-anchor="middle" class="component-text">Storage Engine</text>
  <text x="1140" y="742" text-anchor="middle" class="component-text">数据持久化</text>
  <text x="1140" y="754" text-anchor="middle" class="component-text">索引操作</text>
  <text x="1140" y="766" text-anchor="middle" class="component-text">缓冲管理</text>

</svg>
