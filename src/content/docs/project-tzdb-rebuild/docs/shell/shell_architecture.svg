<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" width="1200" height="1400">
  <defs>
    <style>
      .layer-title { font-size: 16px; font-weight: bold; fill: #ffffff; }
      .component-title { font-size: 13px; font-weight: bold; fill: #1a1a1a; }
      .component-text { font-size: 11px; fill: #1a1a1a; }
      .state-text { font-size: 12px; fill: #ffffff; font-weight: bold; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed-arrow { stroke: #666666; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; marker-end: url(#arrowhead-dashed); }
      .layer-bg { fill-opacity: 0.1; stroke-width: 2; }
      .component-box { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
      .state-box { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .state-box-error { fill: #f44336; stroke: #c62828; stroke-width: 2; }
      .state-box-neutral { fill: #2196F3; stroke: #1565c0; stroke-width: 2; }
      .title { font-size: 20px; font-weight: bold; fill: #1a1a1a; }
      .section-title { font-size: 14px; font-weight: bold; fill: #1a1a1a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333333" />
    </marker>
    <marker id="arrowhead-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">TZDB Shell 架构设计</text>

  <!-- ============ Part 1: Layered Architecture ============ -->
  <text x="50" y="70" class="section-title">1. 分层架构设计</text>

  <!-- User Interaction Layer -->
  <rect x="50" y="100" width="1100" height="180" class="layer-bg" fill="#E3F2FD" stroke="#1976D2"/>
  <text x="60" y="125" class="layer-title" fill="#1976D2">用户交互层 (User Interaction Layer)</text>

  <rect x="70" y="135" width="160" height="130" class="component-box"/>
  <text x="150" y="155" text-anchor="middle" class="component-title">ReadQuery</text>
  <text x="150" y="175" text-anchor="middle" class="component-text">多行输入处理</text>
  <text x="150" y="190" text-anchor="middle" class="component-text">TTY/非TTY模式</text>
  <text x="150" y="205" text-anchor="middle" class="component-text">历史记录管理</text>
  <text x="150" y="220" text-anchor="middle" class="component-text">行编辑功能</text>

  <rect x="250" y="135" width="160" height="130" class="component-box"/>
  <text x="330" y="155" text-anchor="middle" class="component-title">命令识别</text>
  <text x="330" y="175" text-anchor="middle" class="component-text">IsExitCommand</text>
  <text x="330" y="190" text-anchor="middle" class="component-text">IsTransactionControl</text>
  <text x="330" y="205" text-anchor="middle" class="component-text">Command</text>
  <text x="330" y="220" text-anchor="middle" class="component-text">命令分类</text>

  <rect x="430" y="135" width="160" height="130" class="component-box"/>
  <text x="510" y="155" text-anchor="middle" class="component-title">提示符管理</text>
  <text x="510" y="175" text-anchor="middle" class="component-text">GetTransaction</text>
  <text x="510" y="190" text-anchor="middle" class="component-text">Prompt</text>
  <text x="510" y="205" text-anchor="middle" class="component-text">动态状态显示</text>
  <text x="510" y="220" text-anchor="middle" class="component-text">事务ID显示</text>

  <rect x="610" y="135" width="160" height="130" class="component-box"/>
  <text x="690" y="155" text-anchor="middle" class="component-title">结果格式化</text>
  <text x="690" y="175" text-anchor="middle" class="component-text">FortTableWriter</text>
  <text x="690" y="190" text-anchor="middle" class="component-text">表格生成</text>
  <text x="690" y="205" text-anchor="middle" class="component-text">UTF-8编码</text>
  <text x="690" y="220" text-anchor="middle" class="component-text">边框绘制</text>

  <rect x="790" y="135" width="160" height="130" class="component-box"/>
  <text x="870" y="155" text-anchor="middle" class="component-title">错误处理</text>
  <text x="870" y="175" text-anchor="middle" class="component-text">异常捕获</text>
  <text x="870" y="190" text-anchor="middle" class="component-text">错误输出</text>
  <text x="870" y="205" text-anchor="middle" class="component-text">事务污染标记</text>
  <text x="870" y="220" text-anchor="middle" class="component-text">mark_txn_tainted</text>

  <rect x="970" y="135" width="160" height="130" class="component-box"/>
  <text x="1050" y="155" text-anchor="middle" class="component-title">主循环控制</text>
  <text x="1050" y="175" text-anchor="middle" class="component-text">REPL循环</text>
  <text x="1050" y="190" text-anchor="middle" class="component-text">命令分发</text>
  <text x="1050" y="205" text-anchor="middle" class="component-text">结果输出</text>
  <text x="1050" y="220" text-anchor="middle" class="component-text">状态维护</text>

  <!-- Business Logic Layer -->
  <rect x="50" y="310" width="1100" height="180" class="layer-bg" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="60" y="335" class="layer-title" fill="#7B1FA2">业务逻辑层 (Business Logic Layer)</text>

  <rect x="70" y="345" width="160" height="130" class="component-box"/>
  <text x="150" y="365" text-anchor="middle" class="component-title">查询规范化</text>
  <text x="150" y="385" text-anchor="middle" class="component-text">NormalizeQuery</text>
  <text x="150" y="400" text-anchor="middle" class="component-text">移除空格</text>
  <text x="150" y="415" text-anchor="middle" class="component-text">移除分号</text>
  <text x="150" y="430" text-anchor="middle" class="component-text">大小写转换</text>

  <rect x="250" y="345" width="160" height="130" class="component-box"/>
  <text x="330" y="365" text-anchor="middle" class="component-title">事务管理</text>
  <text x="330" y="385" text-anchor="middle" class="component-text">HandleTransaction</text>
  <text x="330" y="400" text-anchor="middle" class="component-text">Cmd</text>
  <text x="330" y="415" text-anchor="middle" class="component-text">BEGIN/COMMIT</text>
  <text x="330" y="430" text-anchor="middle" class="component-text">/ROLLBACK</text>

  <rect x="430" y="345" width="160" height="130" class="component-box"/>
  <text x="510" y="365" text-anchor="middle" class="component-title">SQL执行</text>
  <text x="510" y="385" text-anchor="middle" class="component-text">SqlContext</text>
  <text x="510" y="400" text-anchor="middle" class="component-text">Execute()</text>
  <text x="510" y="415" text-anchor="middle" class="component-text">PollExecuteGeneral</text>
  <text x="510" y="430" text-anchor="middle" class="component-text">Sql()</text>

  <rect x="610" y="345" width="160" height="130" class="component-box"/>
  <text x="690" y="365" text-anchor="middle" class="component-title">事务状态机</text>
  <text x="690" y="385" text-anchor="middle" class="component-text">Transaction</text>
  <text x="690" y="400" text-anchor="middle" class="component-text">GetTransactionState</text>
  <text x="690" y="415" text-anchor="middle" class="component-text">SetTainted</text>
  <text x="690" y="430" text-anchor="middle" class="component-text">GetReadTs</text>

  <rect x="790" y="345" width="160" height="130" class="component-box"/>
  <text x="870" y="365" text-anchor="middle" class="component-title">自动事务模式</text>
  <text x="870" y="385" text-anchor="middle" class="component-text">隐式事务包装</text>
  <text x="870" y="400" text-anchor="middle" class="component-text">自动提交/回滚</text>
  <text x="870" y="415" text-anchor="middle" class="component-text">快速执行模式</text>
  <text x="870" y="430" text-anchor="middle" class="component-text">单查询优化</text>

  <rect x="970" y="345" width="160" height="130" class="component-box"/>
  <text x="1050" y="365" text-anchor="middle" class="component-title">显式事务模式</text>
  <text x="1050" y="385" text-anchor="middle" class="component-text">用户控制边界</text>
  <text x="1050" y="400" text-anchor="middle" class="component-text">多操作原子性</text>
  <text x="1050" y="415" text-anchor="middle" class="component-text">TAINTED状态</text>
  <text x="1050" y="430" text-anchor="middle" class="component-text">显式错误处理</text>

  <!-- Database Engine Layer -->
  <rect x="50" y="520" width="1100" height="180" class="layer-bg" fill="#E8F5E9" stroke="#388E3C"/>
  <text x="60" y="545" class="layer-title" fill="#388E3C">数据库引擎层 (Database Engine Layer)</text>

  <rect x="70" y="555" width="200" height="130" class="component-box"/>
  <text x="170" y="575" text-anchor="middle" class="component-title">数据库连接</text>
  <text x="170" y="595" text-anchor="middle" class="component-text">Database</text>
  <text x="170" y="610" text-anchor="middle" class="component-text">BeginTransaction()</text>
  <text x="170" y="625" text-anchor="middle" class="component-text">CommitTransaction()</text>
  <text x="170" y="640" text-anchor="middle" class="component-text">RollbackTransaction()</text>

  <rect x="290" y="555" width="200" height="130" class="component-box"/>
  <text x="390" y="575" text-anchor="middle" class="component-title">事务管理器</text>
  <text x="390" y="595" text-anchor="middle" class="component-text">TransactionManager</text>
  <text x="390" y="610" text-anchor="middle" class="component-text">事务生命周期</text>
  <text x="390" y="625" text-anchor="middle" class="component-text">并发控制</text>
  <text x="390" y="640" text-anchor="middle" class="component-text">MVCC/锁机制</text>

  <rect x="510" y="555" width="200" height="130" class="component-box"/>
  <text x="610" y="575" text-anchor="middle" class="component-title">数据目录</text>
  <text x="610" y="595" text-anchor="middle" class="component-text">Catalog</text>
  <text x="610" y="610" text-anchor="middle" class="component-text">表结构信息</text>
  <text x="610" y="625" text-anchor="middle" class="component-text">索引管理</text>
  <text x="610" y="640" text-anchor="middle" class="component-text">元数据查询</text>

  <rect x="730" y="555" width="200" height="130" class="component-box"/>
  <text x="830" y="575" text-anchor="middle" class="component-title">查询执行引擎</text>
  <text x="830" y="595" text-anchor="middle" class="component-text">Query Executor</text>
  <text x="830" y="610" text-anchor="middle" class="component-text">SQL解析</text>
  <text x="830" y="625" text-anchor="middle" class="component-text">优化器</text>
  <text x="830" y="640" text-anchor="middle" class="component-text">执行计划</text>

  <rect x="950" y="555" width="200" height="130" class="component-box"/>
  <text x="1050" y="575" text-anchor="middle" class="component-title">存储引擎</text>
  <text x="1050" y="595" text-anchor="middle" class="component-text">Storage Engine</text>
  <text x="1050" y="610" text-anchor="middle" class="component-text">数据持久化</text>
  <text x="1050" y="625" text-anchor="middle" class="component-text">索引操作</text>
  <text x="1050" y="640" text-anchor="middle" class="component-text">缓冲管理</text>

  <!-- Arrows between layers -->
  <path d="M 600 280 L 600 310" class="arrow"/>
  <path d="M 600 490 L 600 520" class="arrow"/>

  <!-- ============ Part 2: Transaction State Machine ============ -->
  <text x="50" y="750" class="section-title">2. 事务状态机</text>

  <!-- States -->
  <circle cx="150" cy="850" r="50" class="state-box-neutral"/>
  <text x="150" y="850" text-anchor="middle" class="state-text">无事务</text>
  <text x="150" y="865" text-anchor="middle" class="state-text">(NULL)</text>

  <circle cx="400" cy="850" r="50" class="state-box"/>
  <text x="400" y="850" text-anchor="middle" class="state-text">RUNNING</text>
  <text x="400" y="865" text-anchor="middle" class="state-text">进行中</text>

  <circle cx="650" cy="850" r="50" class="state-box"/>
  <text x="650" y="850" text-anchor="middle" class="state-text">COMMITTED</text>
  <text x="650" y="865" text-anchor="middle" class="state-text">已提交</text>

  <circle cx="900" cy="850" r="50" class="state-box"/>
  <text x="900" y="850" text-anchor="middle" class="state-text">ABORTED</text>
  <text x="900" y="865" text-anchor="middle" class="state-text">已回滚</text>

  <circle cx="1050" cy="950" r="50" class="state-box-error"/>
  <text x="1050" y="950" text-anchor="middle" class="state-text">TAINTED</text>
  <text x="1050" y="965" text-anchor="middle" class="state-text">被污染</text>

  <!-- Transitions -->
  <!-- NULL -> RUNNING (BEGIN) -->
  <path d="M 200 850 L 350 850" class="arrow"/>
  <text x="275" y="840" text-anchor="middle" class="component-text" font-size="11">BEGIN</text>

  <!-- RUNNING -> COMMITTED (COMMIT) -->
  <path d="M 450 850 L 600 850" class="arrow"/>
  <text x="525" y="840" text-anchor="middle" class="component-text" font-size="11">COMMIT</text>

  <!-- COMMITTED -> NULL -->
  <path d="M 650 800 Q 400 700 150 800" class="arrow"/>
  <text x="400" y="690" text-anchor="middle" class="component-text" font-size="11">返回无事务</text>

  <!-- RUNNING -> ABORTED (ROLLBACK) -->
  <path d="M 450 900 L 850 900" class="arrow"/>
  <text x="650" y="920" text-anchor="middle" class="component-text" font-size="11">ROLLBACK</text>

  <!-- ABORTED -> NULL -->
  <path d="M 900 800 Q 525 700 150 800" class="arrow"/>
  <text x="525" y="680" text-anchor="middle" class="component-text" font-size="11">返回无事务</text>

  <!-- RUNNING -> TAINTED (Error) -->
  <path d="M 450 900 Q 750 950 1000 950" class="dashed-arrow"/>
  <text x="725" y="970" text-anchor="middle" class="component-text" font-size="11">执行失败</text>

  <!-- TAINTED -> NULL (ROLLBACK) -->
  <path d="M 1000 1000 Q 575 1050 150 900" class="arrow"/>
  <text x="575" y="1070" text-anchor="middle" class="component-text" font-size="11">ROLLBACK清除污染</text>

  <!-- ============ Part 3: Command Processing Flow ============ -->
  <text x="50" y="1120" class="section-title">3. 命令处理流程</text>

  <!-- Flow boxes -->
  <rect x="50" y="1150" width="220" height="80" class="component-box"/>
  <text x="160" y="1175" text-anchor="middle" class="component-title">1. 读取输入</text>
  <text x="160" y="1195" text-anchor="middle" class="component-text">ReadQuery()</text>
  <text x="160" y="1210" text-anchor="middle" class="component-text">支持多行输入</text>

  <rect x="300" y="1150" width="220" height="80" class="component-box"/>
  <text x="410" y="1175" text-anchor="middle" class="component-title">2. 规范化</text>
  <text x="410" y="1195" text-anchor="middle" class="component-text">NormalizeQuery()</text>
  <text x="410" y="1210" text-anchor="middle" class="component-text">清理字符串</text>

  <rect x="550" y="1150" width="220" height="80" class="component-box"/>
  <text x="660" y="1175" text-anchor="middle" class="component-title">3. 命令识别</text>
  <text x="660" y="1195" text-anchor="middle" class="component-text">判断命令类型</text>
  <text x="660" y="1210" text-anchor="middle" class="component-text">分类处理</text>

  <rect x="800" y="1150" width="220" height="80" class="component-box"/>
  <text x="910" y="1175" text-anchor="middle" class="component-title">4. 执行</text>
  <text x="910" y="1195" text-anchor="middle" class="component-text">调用处理函数</text>
  <text x="910" y="1210" text-anchor="middle" class="component-text">获取结果</text>

  <!-- Flow arrows -->
  <path d="M 270 1190 L 300 1190" class="arrow"/>
  <path d="M 520 1190 L 550 1190" class="arrow"/>
  <path d="M 770 1190 L 800 1190" class="arrow"/>

  <!-- Command branches -->
  <rect x="50" y="1280" width="200" height="80" class="component-box" fill="#FFE0B2"/>
  <text x="150" y="1305" text-anchor="middle" class="component-title">退出命令</text>
  <text x="150" y="1325" text-anchor="middle" class="component-text">\q, quit, exit</text>
  <text x="150" y="1340" text-anchor="middle" class="component-text">→ 程序退出</text>

  <rect x="300" y="1280" width="200" height="80" class="component-box" fill="#C8E6C9"/>
  <text x="400" y="1305" text-anchor="middle" class="component-title">事务控制</text>
  <text x="400" y="1325" text-anchor="middle" class="component-text">BEGIN/COMMIT</text>
  <text x="400" y="1340" text-anchor="middle" class="component-text">/ROLLBACK</text>

  <rect x="550" y="1280" width="200" height="80" class="component-box" fill="#BBDEFB"/>
  <text x="650" y="1305" text-anchor="middle" class="component-title">SQL查询</text>
  <text x="650" y="1325" text-anchor="middle" class="component-text">SELECT/INSERT</text>
  <text x="650" y="1340" text-anchor="middle" class="component-text">/UPDATE/DELETE</text>

  <rect x="800" y="1280" width="200" height="80" class="component-box" fill="#F8BBD0"/>
  <text x="900" y="1305" text-anchor="middle" class="component-title">系统命令</text>
  <text x="900" y="1325" text-anchor="middle" class="component-text">--help</text>
  <text x="900" y="1340" text-anchor="middle" class="component-text">显示帮助信息</text>

  <!-- Branch arrows from command recognition -->
  <path d="M 660 1150 L 150 1280" class="dashed-arrow"/>
  <path d="M 660 1150 L 400 1280" class="dashed-arrow"/>
  <path d="M 660 1150 L 650 1280" class="dashed-arrow"/>
  <path d="M 660 1150 L 900 1280" class="dashed-arrow"/>

</svg>
